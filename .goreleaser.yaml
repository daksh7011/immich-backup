version: 2

project_name: immich-backup

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
    main: ./main.go

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

brews:
  - name: immich-backup
    repository:
      owner: daksh7011
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/daksh7011/immich-backup"
    description: "Go CLI tool for backing up Immich (self-hosted photo server) using rclone."
    license: MIT
    install: |
      bin.install "immich-backup"
    test: |
      system "#{bin}/immich-backup", "--help"
