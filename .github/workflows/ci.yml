name: Build (CI)

on:
  pull_request:
    types: [opened, synchronize, reopened, edited, labeled]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-ci:
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Labeler
        uses: actions/labeler@v6.0.1

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -v -race ./...

  label-check:
    needs: build-ci
    permissions:
      contents: read
      pull-requests: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check for required PR label
        run: bash .github/scripts/check-pr-labels.sh "${{ join(github.event.pull_request.labels.*.name, ' ') }}"

  release-label-check:
    needs: build-ci
    permissions:
      contents: read
      pull-requests: read
    runs-on: ubuntu-latest
    if: github.base_ref == 'master'
    steps:
      - uses: actions/checkout@v6
      - name: Check for release version label
        run: bash .github/scripts/check-release-labels.sh "${{ join(github.event.pull_request.labels.*.name, ' ') }}"
